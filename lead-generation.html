  <script>
  /* Path fixer: this page lives one folder deep, so prefix inter-page links with ../ */
  (function(){
    var BASE = "../";
    function skip(h){
      return !h || h.charAt(0)==='#' || h.charAt(0)==='/' ||
        h.indexOf('http')===0 || h.indexOf('mailto:')===0 ||
        h.indexOf('tel:')===0 || h.indexOf('../')===0;
    }
    function fix(){
      var as = document.querySelectorAll('a[href]');
      for (var i=0;i<as.length;i++){
        var h = as[i].getAttribute('href');
        if (skip(h)) continue;
        as[i].setAttribute('href', BASE + h);
      }
    }
    document.addEventListener('DOMContentLoaded', function(){
      fix();
      var root = document.getElementById('root') || document.body;
      new MutationObserver(fix).observe(root, { childList:true, subtree:true });
    });
  })();
  </script>
